<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>016 Seguro - Acceso</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="./css/loginRegistro.css?v=3" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body>
    <div class="container-fluid mt-2">
      <div class="d-flex justify-content-end pe-4">
        <button class="btn text-black me-2 btn-modo-discreto">
          Modo discreto
        </button>
        <button
          class="btn text-white btn-danger btn-x-salir"
          style="background: linear-gradient(90deg, #ff4c4c, #ff0000)"
          onclick="salidaRapida()"
        >
          X
        </button>
      </div>
    </div>

    <div class="container px-3 mt-4">
      <div class="card card-login shadow">
        <div
          class="card-header-custom d-flex justify-content-between align-items-center shadow-sm"
        >
          <div>
            <h2 class="fw-bold mb-0">016 SEGURO</h2>
            <p class="mb-0 opacity-75" style="font-size: 0.85rem">
              ACCESO SEGURO CON VERIFICACIÓN
            </p>
          </div>
          <img
            src="logo.png"
            alt="Logo"
            width="70"
            height="70"
            class="rounded-circle border border-white border-2"
          />
        </div>
        <div class="card-body p-4">
          <form id="loginForm" class="needs-validation" novalidate>
            <div class="mb-3">
              <label class="form-label fw-semibold label-purple"
                >CORREO ELECTRÓNICO</label
              >
              <input
                type="email"
                id="emailInput"
                class="form-control form-control-lg"
                placeholder="ejemplo@correo.com"
                required
              />
              <div class="invalid-feedback">Introduce un correo válido.</div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold label-purple"
                >CONTRASEÑA</label
              >
              <input
                type="password"
                id="passInput"
                class="form-control form-control-lg"
                placeholder="••••••••"
                required
              />
              <div class="invalid-feedback">
                La contraseña es necesaria para entrar.
              </div>
            </div>
            <div class="d-grid gap-3 mt-4">
              <button
                type="submit"
                class="btn btn-login-submit py-2 shadow-sm text-white"
              >
                INICIAR SESIÓN
              </button>
              <button
                type="button"
                id="btnIrRegistro"
                class="btn btn-outline-purple py-2"
              >
                CREAR CUENTA
              </button>
              <div class="text-center">
                <a
                  href="recuperacion.html"
                  class="forgot-password fw-bold"
                  style="color: #6f42c1; text-decoration: none"
                  >¿Has olvidado tu contraseña?</a
                >
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/login.js?v=3"></script>
  </body>
</html>
