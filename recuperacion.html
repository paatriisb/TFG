<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>016 Seguro - Recuperar Acceso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="./css/loginRegistro.css?v=3">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="container-fluid mt-2">
      <div class="d-flex justify-content-end pe-4">
        <button class="btn text-black me-2 btn-modo-discreto">Modo discreto</button>
        <button class="btn text-white btn-danger btn-x-salir" style="background: linear-gradient(90deg, #ff4c4c, #ff0000)" onclick="salidaRapida()">X</button>
      </div>
    
    <div class="container px-3 mt-5">
        <div class="card card-login shadow mx-auto">
            <div class="card-header-custom d-flex justify-content-between align-items-center shadow-sm">
                <div>
                    <h2 class="fw-bold mb-0">RECUPERAR</h2>
                    <p class="mb-0 opacity-75" style="font-size: 0.85rem;">ENVÍO DE CÓDIGO SEGURO</p>
                </div>
                <img src="logo.png" alt="Logo" width="70" height="70" class="rounded-circle border border-white border-2" />
            </div>
            <div class="card-body p-4 text-center">
                <p class="text-muted mb-4">Introduce tu correo y te enviaremos las instrucciones para recuperar tu acceso.</p>
                <form id="form-recuperar" class="needs-validation" novalidate>
                    <div class="mb-4 text-start position-relative">
                        <label class="form-label fw-semibold label-purple">CORREO ELECTRÓNICO</label>
                        <input type="email" class="form-control form-control-lg" id="email-recuperar" placeholder="ejemplo@correo.com" required>
                        <div class="invalid-feedback label-purple">
                            Campo obligatorio.
                        </div>
                    </div>
                    <div class="d-grid gap-3">
                        <button type="submit" class="btn btn-login-submit py-2 shadow-sm text-white">ENVIAR INSTRUCCIONES</button>
                        <a href="login.html" class="btn btn-outline-purple py-2 text-decoration-none">VOLVER ATRÁS</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/recuperacion.js?v=3"></script>
</body>
</html>
