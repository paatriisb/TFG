<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Navegación Segura</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />

    <link href="./css/index.css" rel="stylesheet" />
  </head>

  <body>
    <div class="container-fluid mt-2">
      <div class="d-flex justify-content-end pe-4">
        <button class="btn text-white me-2 btn-modo-discreto">
          Modo discreto
        </button>
        <button
          class="btn text-white btn-danger"
          style="background: linear-gradient(90deg, #ff4c4c, #ff0000)"
        >
          X
        </button>
      </div>
    </div>

    <!-- Card -->
    <div class="container-fluid mt-4 px-2">
      <div class="card shadow border-0 card-principal">
        <!-- título -->
        <div
          class="card-header text-white"
          style="background-color: #6f42c1; padding: 1rem"
        >
          <h4 class="card-title mb-0">Navegación segura</h4>
        </div>

        <!-- Contenido -->
        <div class="card-body">
          <div class="mb-3">
            <span class="fw-semibold">• Borra tu historial de navegación</span>
          </div>
          <div class="mb-3 d-flex justify-content-between align-items-center">
            <span class="fw-semibold">
              • Opción de salir rápido.
              <br />
              &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Mediante: botón escape (esc)
              <img
                src="https://us.123rf.com/450wm/nemalo/nemalo1602/nemalo160200083/54251697-colecci%C3%B3n-electr%C3%B3nica-detalle-del-teclado-de-ordenador-negro-con-esc-clave.jpg?ver=6"
                alt="esc"
                style="width: 100px; height: 50px"
              />
              <br />
              &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; o el siguiente botón:
              <button class="btn btn-danger btn-sm text-white">X</button>
            </span>
          </div>
          <div class="mb-3 d-flex justify-content-between align-items-center">
            <span class="fw-semibold"
              >• Modo incógnito
              <br />
              &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Mediante: los botones (control
              + D)
              <img
                src="https://img.freepik.com/vector-premium/combinacion-teclas-ctrl-d-icono-linea-eficiencia-automatizacion-ahorro-tiempo-tareas-repetitivas-experiencia-usuario-software-computadora-icono-lineal-vectorial-negocios-publicidad_727385-7761.jpg"
                alt="controlD"
                style="width: 100px; height: 50px"
              />
              <br />
              &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; o el siguiente botón:
              <button class="btn btn-sm text-white btn-modo-discreto">
                Modo discreto
              </button>
            </span>
          </div>
          <!-- Botón Entrar -->
          <div class="d-flex justify-content-center mt-4 mb-4 w-100">
            <a href="iniciosesion.html" class="text-decoration-none">
              <button
                class="btn btn-primary px-5 py-2"
                style="
                  background: linear-gradient(90deg, #6f42c1, #9b59b6);
                  border: none;
                  font-weight: 600;
                "
              >
                Entrar
              </button>
            </a>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
