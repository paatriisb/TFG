<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link

      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="./css/editarPerfil.css" />
  </head>
  <body>
    <!-- Navegador -->
    <nav
      class="navbar navbar-expand-sm navbar-dark"
      style="background-color: #6f42c1"
    >
      <div class="container-fluid d-flex p-0">
        <!-- Logo -->
        <div class="nav-item text-center flex-fill">
          <a class="navbar-brand text-white" href="introduccion.html">
            <img
              src="logo.png"
              alt="Logo"
              class="rounded-circle"
              width="40"
              height="40"
            />
          </a>
        </div>

        <!-- Botón hamburguesa -->
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarContent"
          aria-controls="navbarContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Items del navbar -->
        <div class="collapse navbar-collapse" id="navbarContent">
          <div class="d-flex w-100">
            <!-- Servicios -->
            <div class="nav-item dropdown text-center flex-fill">
              <a
                class="nav-link dropdown-toggle text-white"
                href="#"
                role="button"
                data-bs-toggle="dropdown"
              >
                Servicios
              </a>
              <ul class="dropdown-menu">
                <li>
                  <a class="dropdown-item" href="ayudaLegal.html"
                    >Ayuda legal</a
                  >
                </li>
                <li>
                  <a class="dropdown-item" href="psicologia.html">Psicología</a>
                </li>
                <li>
                  <a class="dropdown-item" href="centrosAcogida.html"
                    >Centros de acogida</a
                  >
                </li>
              </ul>
            </div>

            <!-- Información -->
            <div class="nav-item dropdown text-center flex-fill">
              <a
                class="nav-link dropdown-toggle text-white"
                href="#"
                role="button"
                data-bs-toggle="dropdown"
              >
                Información
              </a>
              <ul class="dropdown-menu">
                <li>
                  <a class="dropdown-item" href="prevencionSeguridad.html"
                    >Prevención y seguridad</a
                  >
                </li>
                <li>
                  <a class="dropdown-item" href="derechosLegislacion.html"
                    >Derechos y legislación</a
                  >
                </li>
                <li>
                  <a class="dropdown-item" href="guiasYrecursosdeapoyo.html"
                    >Guías y recursos de apoyo</a
                  >
                </li>
                <li>
                  <a class="dropdown-item" href="testimonios.html"
                    >Testimonios y experiencias</a
                  >
                </li>
              </ul>
            </div>

            <!-- Emergencia -->
            <div class="nav-item text-center flex-fill">
              <a class="nav-link text-white" href="emergencia.html"
                >Emergencia</a
              >
            </div>

            <!-- Usuario -->
            <div class="nav-item text-center flex-fill">
              <a
                href="editarPerfil.html"
                class="navbar-text text-white text-decoration-none"
              >
                <i class="bi bi-person me-2"></i>
                <span id="navUsuario">Usuario</span>
              </a>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <div class="container-fluid mt-2">
      <div class="d-flex justify-content-end pe-4">
        <button class="btn text-white me-2 btn-modo-discreto">
          Modo discreto
        </button>
        <button
          class="btn text-white btn-danger"
          style="background: linear-gradient(90deg, #ff4c4c, #ff0000)"
          onclick="salidaRapida()"
        >
          X
        </button>
      </div>
    </div>

    <div class="container px-3">
      <div class="card card-login shadow">
        <div
          class="card-header-custom d-flex justify-content-between align-items-center shadow-sm"
        >
          <div>
            <h2 class="fw-bold mb-0">MI PERFIL</h2>
            <p class="mb-0 opacity-75" style="font-size: 0.85rem">
              EDITAR INFORMACIÓN DE USUARIO
            </p>
          </div>
          <img
            src="logo.png"
            alt="Logo"
            width="70"
            height="70"
            class="rounded-circle border border-white border-2"
          />
        </div>

        <div class="card-body p-4">
          <form id="formPerfil">
            <div class="mb-3">
              <label class="form-label fw-semibold label-purple"
                >NOMBRE DE USUARIO</label
              >
              <input
                type="text"
                class="form-control form-control-lg"
                id="nombreUsuario"
              />
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold label-purple"
                >CORREO ELECTRÓNICO</label
              >
              <input
                type="email"
                class="form-control form-control-lg"
                id="emailUsuario"
              />
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold label-purple"
                >CAMBIAR CONTRASEÑA</label
              >
              <input
                type="password"
                class="form-control form-control-lg"
                id="passwordUsuario"
                placeholder="Nueva contraseña"
              />
            </div>

            <div class="d-grid gap-3">
              <button
                type="submit"
                class="btn btn-login-submit py-2 shadow-sm text-white"
              >
                GUARDAR CAMBIOS
              </button>
              <a href="introduccion.html" class="btn btn-outline-purple py-2"
                >CANCELAR</a
              >
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/editarPerfil.js"></script>
  </body>
</html>
